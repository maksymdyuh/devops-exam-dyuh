name: "Task 2: Ansible Install"

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: "Public IP of dyuh-node"
        required: true
        type: string
      ssh_user:
        description: "SSH user"
        required: false
        default: "root"
        type: string
      run_apply:
        description: "Run real installation after checks"
        required: true
        default: true
        type: boolean

jobs:
  ansible:
    name: "Ansible check and install"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          ssh-keyscan -H ${{ inputs.target_host }} >> ~/.ssh/known_hosts

      - name: Generate dynamic inventory
        run: |
          cat > task2/ansible/inventory.ini <<EOF
          [k8s_nodes]
          node1 ansible_host=${{ inputs.target_host }} ansible_user=${{ inputs.ssh_user }}
          EOF

      - name: Validate playbook syntax
        run: ansible-playbook -i task2/ansible/inventory.ini task2/ansible/playbook.yml --syntax-check

      - name: Dry-run installation (check mode)
        run: ansible-playbook -i task2/ansible/inventory.ini task2/ansible/playbook.yml --check --diff

      - name: Run installation
        if: ${{ inputs.run_apply == true }}
        run: ansible-playbook -i task2/ansible/inventory.ini task2/ansible/playbook.yml
