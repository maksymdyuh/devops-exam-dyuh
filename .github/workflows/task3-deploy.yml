name: "Task 3: Deploy App"

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: "Public IP of dyuh-node"
        required: true
        type: string
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev (Port 8002, Tag develop)
          - release (Port 8003, Tag 1.0.0)
      action:
        description: "Action to perform"
        required: true
        default: "Deploy"
        type: choice
        options:
          - Deploy
          - Rollback (undo last deploy)
          - Pre-flight Check (dry-run only)

jobs:
  build:
    name: "Build and Push Docker Image"
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'Rollback'
    steps:
      - name: Checkout app code (develop branch)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: develop

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (develop tag)
        if: startsWith(github.event.inputs.environment, 'dev')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/exam-app:develop

      - name: Build and push (1.0.0 tag)
        if: startsWith(github.event.inputs.environment, 'release')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/exam-app:1.0.0

  deploy:
    name: "Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Checkout our infrastructure code
        uses: actions/checkout@v4

      - name: Prepare connection and variables
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ inputs.target_host }} >> ~/.ssh/known_hosts

          if [[ "${{ inputs.environment }}" == "dev"* ]]; then
            echo "NAMESPACE=dev" >> $GITHUB_ENV
            echo "IMAGE_TAG=develop" >> $GITHUB_ENV
            echo "EXT_PORT=8002" >> $GITHUB_ENV
          else
            echo "NAMESPACE=release" >> $GITHUB_ENV
            echo "IMAGE_TAG=1.0.0" >> $GITHUB_ENV
            echo "EXT_PORT=8003" >> $GITHUB_ENV
          fi
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> $GITHUB_ENV

      - name: Pre-flight check (Dry-run)
        if: inputs.action == 'Pre-flight Check (dry-run only)'
        run: |
          envsubst < task3/k8s/deployment.yaml > deploy.yaml
          envsubst < task3/k8s/service.yaml > service.yaml
          scp deploy.yaml service.yaml root@${{ inputs.target_host }}:/tmp/
          ssh root@${{ inputs.target_host }} "kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f - && kubectl apply -f /tmp/deploy.yaml --dry-run=client && kubectl apply -f /tmp/service.yaml --dry-run=client"

      - name: Deploy
        if: inputs.action == 'Deploy'
        run: |
          envsubst < task3/k8s/deployment.yaml > deploy.yaml
          envsubst < task3/k8s/service.yaml > service.yaml
          scp deploy.yaml service.yaml root@${{ inputs.target_host }}:/tmp/
          ssh root@${{ inputs.target_host }} "kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -"
          ssh root@${{ inputs.target_host }} "kubectl apply -f /tmp/deploy.yaml"
          ssh root@${{ inputs.target_host }} "kubectl apply -f /tmp/service.yaml"
          
          # Setup Port-Forwarding via systemd for reliability
          ssh root@${{ inputs.target_host }} << EOF
          cat > /etc/systemd/system/k8s-pf-$NAMESPACE.service << 'SVC'
          [Unit]
          Description=Kubernetes Port Forward for $NAMESPACE
          After=network.target

          [Service]
          Type=simple
          User=root
          ExecStart=/usr/local/bin/kubectl port-forward --address 0.0.0.0 svc/app-service $EXT_PORT:80 -n $NAMESPACE
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SVC
          systemctl daemon-reload
          systemctl restart k8s-pf-$NAMESPACE
          systemctl enable k8s-pf-$NAMESPACE
          EOF

      - name: Rollback
        if: inputs.action == 'Rollback (undo last deploy)'
        run: |
          ssh root@${{ inputs.target_host }} "kubectl rollout undo deployment/app-deployment -n $NAMESPACE"
